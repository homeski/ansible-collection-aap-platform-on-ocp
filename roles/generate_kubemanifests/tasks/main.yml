---
- name: Handle the directory creation and/or cleanup
  when: >
    ansibleautomationplatform is defined or
    automationcontroller is defined or
    automationhub is defined or
    configmaps is defined or
    eda is defined or
    operatorgroups is defined or
    pvcs is defined or
    routes is defined or
    secrets is defined or
    subscriptions is defined
  block:
    - name: Empty the kubemanifest parent directory, if it exists
      ansible.builtin.file:
        path: "{{ generate_kubemanifests_template_parent_dir }}"
        state: absent
      when: generate_kubemanifests_template_empty | bool
      failed_when: false

- name: Handle the crs directory creation
  when: >
    ansibleautomationplatform is defined or
    automationcontroller is defined or
    automationhub is defined or
    eda is defined
  block:
    - name: Create the generated crs directory
      ansible.builtin.file:
        mode: '0775'
        path: "{{ generate_kubemanifests_template_host_dir }}/crs"
        state: directory

- name: Handle the resource directory creation
  block:
    - name: "Create the generated {{ item }} directory"
      ansible.builtin.file:
        mode: '0775'
        path: "{{ generate_kubemanifests_template_host_dir }}/{{ item }}"
        state: directory
      loop:
        - configmaps
        - pvcs
        - routes
        - secrets
      when: item is defined and item

- name: Handle the operator directories creation
  block:
    - name: "Create the generated {{ item }} directory"
      ansible.builtin.file:
        mode: '0775'
        path: "{{ generate_kubemanifests_template_group_dir }}/{{ item }}"
        state: directory
      loop:
        - operatorgroups
        - subscriptions
      when: item is defined and item

- name: Template ansibleautomationplatform.yml
  ansible.builtin.copy:
    content: >
      {{
        lookup('ansible.builtin.template', generate_kubemanifests_template_file_ansibleautomationplatform) |
        from_yaml |
        combine(ansibleautomationplatform, recursive=true) |
        to_nice_yaml(2)
      }}
    dest: "{{ generate_kubemanifests_template_host_dir }}/crs/ansibleautomationplatform.yml"
    mode: '0644'
  when: ansibleautomationplatform is defined and ansibleautomationplatform

- name: Template automationcontroller.yml
  ansible.builtin.copy:
    content: >
      {{
        lookup('ansible.builtin.template', generate_kubemanifests_template_file_automationcontroller) |
        from_yaml |
        combine(automationcontroller, recursive=true) |
        to_nice_yaml(2)
      }}
    dest: "{{ generate_kubemanifests_template_host_dir }}/crs/automationcontroller.yml"
    mode: '0644'
  when: automationcontroller is defined and automationcontroller

- name: Template automationhub.yml
  ansible.builtin.copy:
    content: >
      {{
        lookup('ansible.builtin.template', generate_kubemanifests_template_file_automationhub) |
        from_yaml |
        combine(automationhub, recursive=true) |
        to_nice_yaml(2)
      }}
    dest: "{{ generate_kubemanifests_template_host_dir }}/crs/automationhub.yml"
    mode: '0644'
  when: automationhub is defined and automationhub

- name: Template eda.yml
  ansible.builtin.copy:
    content: >
      {{
        lookup('ansible.builtin.template', generate_kubemanifests_template_file_eda) |
        from_yaml |
        combine(eda, recursive=true) |
        to_nice_yaml(2)
      }}
    dest: "{{ generate_kubemanifests_template_host_dir }}/crs/eda.yml"
    mode: '0644'
  when: eda is defined and eda

- name: Template configmaps
  ansible.builtin.copy:
    content: >
      {{
        lookup('ansible.builtin.template', generate_kubemanifests_template_file_configmap) |
        from_yaml |
        to_nice_yaml(indent=2, sort_keys=false)
      }}
    dest: "{{ generate_kubemanifests_template_host_dir }}/configmaps/{{ item.metadata.name }}.yml"
    mode: '0644'
  loop: "{{ configmaps }}"
  when: configmaps is defined and configmaps

